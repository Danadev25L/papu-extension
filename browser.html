<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>پەپوو — پرسیار</title>
  <link rel="stylesheet" href="browser.css">
  <!-- Choices.js for better dropdowns -->
  <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css">
</head>
<body>
  <header class="header">
    <div class="header-content">
      <h1>پەپوو</h1>
      <p class="header-subtitle">پڕکردنەوەی خۆکاری پرسیار</p>
    </div>
    <a id="optsLink" href="#" class="settings-btn" target="_blank">ڕێکخستنەکان</a>
  </header>

  <div class="container">
    <aside class="sidebar">
      <div class="filter-group">
        <label>بابەت</label>
        <select id="filterSubject"></select>
      </div>

      <div class="filter-group">
        <label>ساڵ</label>
        <select id="filterYear"></select>
      </div>

      <div class="filter-group">
        <label>قۆناغ</label>
        <select id="filterPeriod"></select>
      </div>

      <div class="filter-group" id="unitFilterWrapper">
        <label>بەند (Unit)</label>
        <select id="filterUnit"></select>
        <button id="refreshUnitsBtn" class="btn-secondary">🔄 Reload</button>
      </div>

      <div class="filter-group">
        <label>گەڕان</label>
        <input type="search" id="searchInput" class="input" placeholder="گەڕان...">
      </div>

      <div class="stats">
        <span id="countLabel">0 پرسیار</span>
      </div>

      <!-- Bulk Create Section -->
      <div class="bulk-section" id="bulkSection" style="display: none;">
        <div class="bulk-info">
          <span id="selectedCount">0</span> پرسیار هەڵبژێراوە
        </div>
        <button id="bulkCreateBtn" class="btn-bulk">🚀 دروستکردنی گەورەیی</button>
        <button id="clearSelectionBtn" class="btn-secondary">پاککردنەوە</button>
      </div>

      <!-- Bulk Progress -->
      <div class="bulk-progress" id="bulkProgress" style="display: none;">
        <div class="progress-text">
          <span id="progressText">درێژکراوە...</span>
          <span id="progressCount">0/0</span>
        </div>
        <div class="progress-bar">
          <div id="progressFill" class="progress-fill"></div>
        </div>
      </div>
    </aside>

    <main class="questions">
      <div id="questionsList" class="questions-grid"></div>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script src="browser.js" type="module"></script>
</body>
</html>
